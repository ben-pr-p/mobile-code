<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #FAFAF9; font-family: monospace; overflow-x: hidden; }
    @media (prefers-color-scheme: dark) { body { background: #0C0A09; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
  <script>
    // Simulate what React Native would send
    setTimeout(() => {
      window.postMessage(JSON.stringify({
        type: "files",
        oldFile: { name: "app.ts", contents: 'const greeting = "hello";\nconsole.log(greeting);' },
        newFile: { name: "app.ts", contents: 'const greeting = "hello world";\nconsole.log(greeting);\nconsole.log("done");' },
        colorScheme: "dark",
        diffStyle: "unified"
      }), "*");
    }, 1000);
  </script>
</body>
</html>
